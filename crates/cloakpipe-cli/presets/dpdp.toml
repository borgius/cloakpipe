# CloakPipe policy preset: DPDP Act 2023 (India)
# Full `cloakpipe.toml`-compatible config focused on India-centric personal data.
# This captures technical masking defaults only; legal compliance still requires
# consent, retention, access control, and breach-handling processes.

[proxy]
listen = "127.0.0.1:8400"
upstream = "https://api.openai.com"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"
masking_strategy = "token"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"
backend = "file"

[detection]
secrets = true
financial = false
dates = true
emails = true
phone_numbers = true
ip_addresses = true
urls_internal = false

[detection.ner]
enabled = false
backend = "distilbert_pii"
confidence_threshold = 0.70
# model = "models/distilbert-pii/quantized/model_quantized.onnx"

[detection.custom]
patterns = [
  { name = "upi_id", regex = "\\b[A-Za-z0-9._-]{2,}@[A-Za-z][A-Za-z0-9._-]{1,63}\\b", category = "UPI_ID" },
  { name = "gstin", regex = "\\b\\d{2}[A-Z]{5}\\d{4}[A-Z][1-9A-Z]Z[0-9A-Z]\\b", category = "GSTIN" },
  { name = "ifsc", regex = "\\b[A-Z]{4}0[A-Z0-9]{6}\\b", category = "IFSC" },
  { name = "bank_account_in", regex = "(?i)\\b(?:account|a/c)\\s*(?:number|no\\.?|#)?[:\\s-]*\\d{9,18}\\b", category = "BANK_ACCOUNT" },
]

[detection.overrides]
preserve = []
force = []

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
