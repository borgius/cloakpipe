# CloakPipe policy preset: HIPAA
# Healthcare-oriented masking defaults for protected health information (PHI).
# Emphasizes structured healthcare identifiers and keeps common public agencies visible.

[proxy]
listen = "127.0.0.1:8400"
upstream = "https://api.openai.com"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"
masking_strategy = "similar"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"
backend = "file"

[detection]
secrets = true
financial = false
dates = true
emails = true
phone_numbers = true
ip_addresses = false
urls_internal = false

[detection.ner]
enabled = false
backend = "distilbert_pii"
confidence_threshold = 0.70
# model = "models/distilbert-pii/quantized/model_quantized.onnx"

[detection.custom]
patterns = [
  { name = "mrn", regex = "(?i)\\b(?:MRN|medical\\s*record(?:\\s*number)?)[:#\\s-]*[A-Z0-9-]{6,20}\\b", category = "MRN" },
  { name = "npi", regex = "(?i)\\bNPI(?:\\s*(?:number|no\\.?))?[:#\\s-]*\\d{10}\\b", category = "NPI" },
  { name = "dea", regex = "(?i)\\bDEA(?:\\s*(?:number|no\\.?))?[:#\\s-]*[A-Z]{2}\\d{7}\\b", category = "DEA" },
  { name = "icd10", regex = "\\b[A-TV-Z][0-9][0-9AB](?:\\.[0-9A-TV-Z]{1,4})?\\b", category = "ICD10" },
  { name = "insurance_member_id", regex = "(?i)\\b(?:member|subscriber|policy)\\s*(?:id|number|no\\.?|#)?[:\\s-]*[A-Z0-9-]{6,24}\\b", category = "INSURANCE_ID" },
]

[detection.overrides]
preserve = ["FDA", "CDC", "WHO", "NIH"]
force = []

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
