name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_BINARY: cloakpipe

jobs:
  test:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: bash tools/ci/run_workspace_checks.sh

  prepare_release:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: bash tools/ci/configure_git.sh

      - id: bump
        name: Bump workspace version
        run: bash tools/ci/prepare_release.sh

  build_release:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          # - runner: macos-13
          #   os: darwin
          #   arch: x86_64
          - runner: macos-14
            os: darwin
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare_release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: bash tools/ci/build_release_binary.sh "${{ env.RELEASE_BINARY }}"

      - name: Package release artifact
        run: bash tools/ci/package_release_artifact.sh "${{ env.RELEASE_BINARY }}" "${{ needs.prepare_release.outputs.version }}" "${{ matrix.os }}" "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BINARY }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  package_cargo_release:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs: prepare_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare_release.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Package cargo crate
        run: bash tools/ci/package_cargo_artifact.sh "cloakpipe-cli" "${{ needs.prepare_release.outputs.version }}" "borgius-cloakpipe"

      - uses: actions/upload-artifact@v4
        with:
          name: cargo-package
          path: dist/*.crate

  publish_release:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    needs:
      - prepare_release
      - build_release
      - package_cargo_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.1.3
        with:
          path: dist
          pattern: ${{ env.RELEASE_BINARY }}-*
          merge-multiple: true

      - uses: actions/download-artifact@v4.1.3
        with:
          name: cargo-package
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          target_commitish: ${{ needs.prepare_release.outputs.sha }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.crate
