# CloakPipe policy preset: PCI-DSS
# Payment-card oriented masking defaults for cardholder-data environments.
# Focuses on PAN, expiry, CVV, and track-data-like patterns; still protects
# common contact information found in payment support transcripts.

[proxy]
listen = "127.0.0.1:8400"
upstream = "https://api.openai.com"
api_key_env = "OPENAI_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"
masking_strategy = "token"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"
backend = "file"

[detection]
secrets = true
financial = false
dates = false
emails = true
phone_numbers = true
ip_addresses = false
urls_internal = false

[detection.ner]
enabled = false
backend = "distilbert_pii"
confidence_threshold = 0.70
# model = "models/distilbert-pii/quantized/model_quantized.onnx"

[detection.custom]
patterns = [
  { name = "payment_card_pan", regex = "\\b(?:4\\d{3}(?:[- ]?\\d{4}){3}|5[1-5]\\d{2}(?:[- ]?\\d{4}){3}|3[47]\\d{2}[- ]?\\d{6}[- ]?\\d{5}|6(?:011|5\\d{2})(?:[- ]?\\d{4}){3})\\b", category = "CREDIT_CARD" },
  { name = "payment_card_pan_contextual", regex = "(?i)\\b(?:card|pan)\\s*(?:number|no\\.?|#)?[:\\s-]*\\d{13,19}\\b", category = "CREDIT_CARD" },
  { name = "payment_card_expiry", regex = "(?i)\\b(?:exp|expiry|expires?)[:\\s-]*(?:0[1-9]|1[0-2])/[0-9]{2}(?:[0-9]{2})?\\b", category = "CARD_EXPIRY" },
  { name = "payment_card_cvv", regex = "(?i)\\b(?:cvv|cvc|cid)[:\\s-]*\\d{3,4}\\b", category = "CARD_VERIFICATION_CODE" },
  { name = "track_two_data", regex = ";[0-9]{13,19}=[0-9]{4}[0-9A-Z]*\\?", category = "TRACK_DATA" },
]

[detection.overrides]
preserve = []
force = []

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
