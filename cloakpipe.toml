profile = "fintech"

[proxy]
listen = "127.0.0.1:8900"
upstream = "http://localhost:11434"
api_key_env = "OLLAMA_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"
dry_run = false
bypass = []
auth_mode = "pass-through"
masking_strategy = "similar"

[proxy.provider_routes]

[proxy.http_proxy]
inspect_https = false
allowed_hosts = []
tunnel_unknown_hosts = true
http2_mitm = false
forward_no_proxy = []

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"
key_keyring = false
backend = "file"

[detection]
secrets = true
financial = true
dates = true
emails = true
phone_numbers = true
ip_addresses = true
urls_internal = true

[detection.ner]
enabled = true
backend = "distilbert_pii"
confidence_threshold = 0.4
entity_types = []
sidecar_url = ""

[[detection.custom.patterns]]
name = "ssn"
regex = '\b\d{3}-\d{2}-\d{4}\b'
category = "SSN"

[[detection.custom.patterns]]
name = "aadhaar"
regex = '\b\d{4}\s\d{4}\s\d{4}\b'
category = "AADHAAR"

[[detection.custom.patterns]]
name = "pan_card"
regex = '\b[A-Z]{5}\d{4}[A-Z]\b'
category = "PAN"

[[detection.custom.patterns]]
name = "gstin"
regex = '\b\d{2}[A-Z]{5}\d{4}[A-Z][1-9A-Z]Z[0-9A-Z]\b'
category = "GSTIN"

[[detection.custom.patterns]]
name = "upi_id"
regex = '\b[A-Za-z0-9._-]{2,}@[A-Za-z][A-Za-z0-9._-]{1,63}\b'
category = "UPI_ID"

[[detection.custom.patterns]]
name = "credit_card"
regex = '\b(?:4\d{3}(?:[- ]?\d{4}){3}|5[1-5]\d{2}(?:[- ]?\d{4}){3}|3[47]\d{2}[- ]?\d{6}[- ]?\d{5}|6(?:011|5\d{2})(?:[- ]?\d{4}){3})\b'
category = "CREDIT_CARD"

[[detection.custom.patterns]]
name = "credit_card_contextual"
regex = '(?i)\b(?:credit\s+card|card|pan)\s*(?:number|no\.?|#)?[:\s-]*(\d(?:[ -]?\d){12,18})\b'
category = "CREDIT_CARD"
value_group = 1

[[detection.custom.patterns]]
name = "card_verification_code"
regex = '(?i)\b(?:cvv|cvc|cid)[:\s-]*(\d{3,4})\b'
category = "CARD_VERIFICATION_CODE"
value_group = 1

[[detection.custom.patterns]]
name = "credit_card_issuer"
regex = '(?i)\b(?:card\s+issuer(?:\s+note)?|credit\s+card\s+issuer\s+repeat|issuer|card\s+brand)[:\s-]*(visa|mastercard|american\s+express|amex|discover)\b'
category = "CREDIT_CARD_ISSUER"
value_group = 1

[[detection.custom.patterns]]
name = "swift_bic"
regex = '\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
category = "SWIFT_CODE"

[[detection.custom.patterns]]
name = "isin"
regex = '\b[A-Z]{2}[A-Z0-9]{9}\d\b'
category = "ISIN"

[[detection.custom.patterns]]
name = "iban"
regex = '\b[A-Z]{2}\d{2}[A-Z0-9]{4}\d{7}(?:[A-Z0-9]){0,16}\b'
category = "IBAN"

[[detection.custom.patterns]]
name = "routing_number"
regex = '(?i)\b(?:routing|ABA)\s*(?:number|no\.?|#)?[:\s-]*(\d{9})\b'
category = "ROUTING_NUMBER"
value_group = 1

[[detection.custom.patterns]]
name = "bank_account"
regex = '(?i)\b(?:bank\s+account|beneficiary\s+account|a/c)\s*(?:number|no\.?|#)?[:\s-]*(\d{8,19})\b'
category = "BANK_ACCOUNT"
value_group = 1

[[detection.custom.patterns]]
name = "account_number"
regex = '(?i)\b(?:account\s*(?:number|no\.?|#)|acct\s*(?:number|no\.?|#)?)[:\s-]*(\d{8,19})\b'
category = "ACCOUNT_NUMBER"
value_group = 1

[[detection.custom.patterns]]
name = "username"
regex = '(?i)\b(?:portal\s+username|username\s+repeat|username|user\s*id|login)[:=\s-]*([a-z0-9._%+-]{3,})\b'
category = "USERNAME"
value_group = 1

[[detection.custom.patterns]]
name = "device_imei"
regex = '(?i)\b(?:device\s+imei|phone\s+imei\s+repeat|phone\s+imei|imei)\s*[:=]\s*(\d{15})\b'
category = "DEVICE_ID"
value_group = 1

[[detection.custom.patterns]]
name = "pin"
regex = '(?i)\b(?:pin\s+on\s+file|pin\s+repeat|pin)\s*[:=]\s*(\d{4,8})\b'
category = "PIN"
value_group = 1

[[detection.custom.patterns]]
name = "age"
regex = '(?i)\bage\s*[:=]\s*(\d{1,3})\b'
category = "AGE"
value_group = 1

[[detection.custom.patterns]]
name = "gender"
regex = '(?i)\b(?:sex|gender)\s*[:=]\s*(female|male|woman|man|nonbinary|transgender|intersex)\b'
category = "GENDER"
value_group = 1

[[detection.custom.patterns]]
name = "mrn"
regex = '(?i)\b(?:MRN|medical\s*record(?:\s*number)?)[:#\s-]*(MRN[-A-Z0-9]{6,20}|[A-Z0-9-]{6,20})\b'
category = "MRN"
value_group = 1

[[detection.custom.patterns]]
name = "npi"
regex = '(?i)\bNPI(?:\s*(?:number|no\.?))?[:#\s-]*\d{10}\b'
category = "NPI"

[[detection.custom.patterns]]
name = "dea"
regex = '(?i)\bDEA(?:\s*(?:number|no\.?))?[:#\s-]*[A-Z]{2}\d{7}\b'
category = "DEA"

[[detection.custom.patterns]]
name = "id_number"
regex = '\b(?i:EMP|INS|WF|FM|ANT|SH|MRN|TN|CP|HR|POL|CLM|REF|ACCT|MBR|HO)[-–]\d[\w-]{3,}\b'
category = "ID_NUMBER"

[[detection.custom.patterns]]
name = "license_number"
regex = '\b(?:CRC|NMLS|NPI|DEA|LPC|BAR|LIC)[-–#\s]*\d{4,}\b'
category = "LICENSE_NUMBER"

[detection.overrides]
preserve = [
    "NYSE",
    "NASDAQ",
    "SEC",
    "FINRA",
    "RBI",
    "SEBI",
]
force = []

[detection.resolver]
enabled = false
threshold = 0.9
min_prefix_len = 4
aliases = []

[tree]
enabled = true
storage_path = "./trees/"
index_model = "gpt-4o"
search_model = "gpt-4o"
max_pages_per_node = 10
max_tokens_per_node = 20000
add_node_summaries = true
pseudonymize_summaries = true

[vectors]
encrypt = false
algorithm = ""

[local]
vector_db = ""

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
backend = "jsonl"

[session]
enabled = false
id_from = "header:x-session-id"
ttl_seconds = 1800
coreference = true
sensitivity_escalation = true
session_threshold = 0.8
