profile = "fintech"

[proxy]
listen = "127.0.0.1:8900"
upstream = "http://localhost:11434"
api_key_env = "OLLAMA_API_KEY"
timeout_seconds = 120
max_concurrent = 256
mode = "proxy"
masking_strategy = "similar"

[vault]
path = "./vault.enc"
encryption = "aes-256-gcm"
key_env = "CLOAKPIPE_VAULT_KEY"
key_keyring = false
backend = "file"

[detection]
secrets = true
financial = true
dates = true
emails = true
phone_numbers = false
ip_addresses = true
urls_internal = true

[detection.ner]
enabled = false
backend = "distilbert_pii"
confidence_threshold = 0.0
entity_types = []
sidecar_url = ""

[[detection.custom.patterns]]
name = "swift_bic"
regex = '\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'
category = "SWIFT_CODE"

[[detection.custom.patterns]]
name = "isin"
regex = '\b[A-Z]{2}[A-Z0-9]{9}\d\b'
category = "ISIN"

[[detection.custom.patterns]]
name = "iban"
regex = '\b[A-Z]{2}\d{2}[A-Z0-9]{4}\d{7}(?:[A-Z0-9]){0,16}\b'
category = "IBAN"

[[detection.custom.patterns]]
name = "routing_number"
regex = '(?i)(?:routing|ABA)\s*(?:no\.?\s*)?#?\s*\d{9}\b'
category = "ROUTING_NUMBER"

[detection.overrides]
preserve = [
    "NYSE",
    "NASDAQ",
    "SEC",
    "FINRA",
    "RBI",
    "SEBI",
]
force = []

[detection.resolver]
enabled = false
threshold = 0.9
min_prefix_len = 4
aliases = []

[tree]
enabled = true
storage_path = "./trees/"
index_model = "gpt-4o"
search_model = "gpt-4o"
max_pages_per_node = 10
max_tokens_per_node = 20000
add_node_summaries = true
pseudonymize_summaries = true

[vectors]
encrypt = false
algorithm = ""

[local]
vector_db = ""

[audit]
enabled = true
log_path = "./audit/"
format = "jsonl"
retention_days = 90
log_entities = true
log_mappings = false
backend = "jsonl"

[session]
enabled = false
id_from = "header:x-session-id"
ttl_seconds = 1800
coreference = true
sensitivity_escalation = true
session_threshold = 0.8
